<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Currency Converter</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

</head>

<body>

<div class="container">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div>

      <div class="logo">

        <div>
          <h3>Currency Converter</h3>
        </div>

      </div>

      <nav>

        <a href="index.html">
          <i class="fa-solid fa-house" aria-hidden="true"></i>
          Converter
        </a>

        <a href="rates.html" class="active">
          <i class="fa-solid fa-chart-column" aria-hidden="true"></i>
          Rates
        </a>

      </nav>

    </div>

    <div class="sidebar-footer">

      <p>
        Thanks for using Currency Converter. Don't forget to share!
      </p>

      <button class="share-box">
        <span>Share</span>
        <i class="fa-solid fa-globe" aria-hidden="true"></i>
      </button>

    </div>

  </aside>

  <!-- MAIN CONTENT -->

  <main class="main-content">

    <!-- CARD -->

    <div class="converter-card">

      <div class="card-header">

        <div>

          <h1>Rates</h1>

          <p>
            Live mid-market exchange rates
          </p>

        </div>

      </div>

      <div class="rates-cards-wrapper">

        <!-- CARD 1: Pair comparison with graph -->
        <div class="pair-card">

          <div class="pair-selectors">

           <div class="pair-dropdown-wrapper">
             <div class="pair-dropdown" id="pair-from-box">
               <img src="https://flagcdn.com/w40/gb.png" alt="GBP flag" class="currency-flag" id="pair-from-flag">
               <span id="pair-from-code">GBP</span>
             <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
           </div>
            <ul class="currency-menu" id="pair-from-menu"></ul>
           </div>
           <i class="fa-solid fa-right-left pair-swap-icon" id="pair-swap-btn" aria-hidden="true"></i>
          <div class="pair-dropdown-wrapper">
          <div class="pair-dropdown" id="pair-to-box">
           <img src="https://flagcdn.com/w40/eu.png" alt="EUR flag" class="currency-flag" id="pair-to-flag">
           <span id="pair-to-code">EUR</span>
           <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
        </div>
        <ul class="currency-menu" id="pair-to-menu"></ul>
      </div>

   </div>

          <p class="pair-rate-line" id="pair-rate-line">1 GBP = 1.17350 EUR</p>
          <p class="pair-rate-time" id="pair-rate-time">Mid-market exchange rate at 13:35 UTC</p>
          
          <div class="chart-wrapper">
          <canvas id="pair-chart" class="pair-chart"></canvas>
        </div>


          <div class="range-buttons">
            <button class="range-btn" data-range="48H">48H</button>
            <button class="range-btn" data-range="1W">1W</button>
            <button class="range-btn range-btn--active" data-range="1M">1M</button>
            <button class="range-btn" data-range="12M">12M</button>
          </div>

        </div>

        <!-- CARD 2: Base amount to list of currencies -->
        <div class="list-card">

          <div class="list-card-input">
            <input type="number" id="list-amount" value="1" min="0">
            <div class="pair-dropdown-wrapper">
             <div class="list-card-currency" id="list-base-box">
               <img src="https://flagcdn.com/w40/gb.png" alt="GBP flag" class="currency-flag" id="list-base-flag">
           <span id="list-base-code">GBP</span>
             <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
          </div>
            <ul class="currency-menu" id="list-base-menu"></ul>
         </div>
     </div>

          <ul class="list-card-results" id="list-card-results">
            <!-- JS will fill this with <li> rows -->
          </ul>

        </div>

      </div>

    </div>

  </main>

</div>

 <script src="rates.js"></script>

</body>
</html>
