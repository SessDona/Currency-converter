<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Currency Converter</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div>

      <div class="logo">

        <div>
          <h3>Currency Converter</h3>
        </div>

      </div>

      <nav>

        <a href="index.html" class="active">
          <i class="fa-solid fa-house"></i>
          Converter
        </a>

        <a href="rates.html">
          <i class="fa-solid fa-chart-column"></i>
          Rates
        </a>

      </nav>

    </div>

    <div class="sidebar-footer">

      <p>
        Thanks for using Currency Converter. Don't forget to share!
      </p>

      <button class="share-box" id="share-btn">
        <span>Share</span>
        <i class="fa-solid fa-globe"></i>
      </button> 
      <!-- Changes to 'Link Copied!' when clicked and copies our link to the user's clipboard. -->

    </div>

  </aside>

  <!-- MAIN CONTENT -->

  <main class="main-content">

    <!-- CARD -->

    <div class="converter-card">

      <div class="card-header">

        <div>

          <h1>Converter</h1>

          <p>
            Convert currencies instantly and easily
          </p>

        </div>

      </div>

      <!-- Amount -->

      <label>Amount</label>

      <div class="amount-box">

        <input
        type="text"
        inputmode="decimal"
        placeholder="Enter an amount">

      </div>

      <!-- Currency Row -->
       

      <div class="currency-row">

        <div class="currency-box">

          <span>USD - US Dollar</span>

          <i class="fa-solid fa-chevron-down"></i>

        </div>

        <button class="swap-btn">

          <i class="fa-solid fa-right-left"></i>

        </button>

        <div class="currency-box">

          <span>NGN - Nigerian Naira</span>

          <i class="fa-solid fa-chevron-down"></i>

        </div>

      </div>

      

      <!-- Result -->

      <label>Converted Amount</label>

      <div class="result-box">

        <h2>₦1,540,000.00</h2>

        <p>1 USD = 1,540 NGN</p>

      </div>

      <button class="convert-btn">

        Convert Currency

      </button>

    </div>

  </main>

</div>

<script>
  const amountInput = document.querySelector(".amount-box input");
  const convertBtn = document.querySelector(".convert-btn");
  const swapBtn = document.querySelector(".swap-btn");

  const currencyBoxes = document.querySelectorAll(".currency-box span");

  const resultAmount = document.querySelector(".result-box h2");
  const rateText = document.querySelector(".result-box p");

  // Default currencies
  let fromCurrency = "USD";
  let toCurrency = "NGN";

  // Sample exchange rates
  const exchangeRates = {
    USD: {
      NGN: 1540,
      EUR: 0.85
    },
    NGN: {
      USD: 1 / 1540,
      EUR: 0.00055
    },
    EUR: {
      USD: 1.18,
      NGN: 1810
    }
  };

  // Convert function
  function convertCurrency() {
    const amount = parseFloat(amountInput.value);

    if (isNaN(amount) || amount <= 0) {
      resultAmount.textContent = "Enter a valid amount";
      rateText.textContent = "";
      return;
    }

    const rate = exchangeRates[fromCurrency][toCurrency];
    const converted = amount * rate;

    resultAmount.textContent =
      `${toCurrency} ${converted.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;

    rateText.textContent =
      `1 ${fromCurrency} = ${rate.toLocaleString()} ${toCurrency}`;
  }

  // Convert button click
  convertBtn.addEventListener("click", convertCurrency);

  // Swap currencies
  swapBtn.addEventListener("click", () => {
    [fromCurrency, toCurrency] = [toCurrency, fromCurrency];

    currencyBoxes[0].textContent =
      `${fromCurrency} - ${
        fromCurrency === "USD"
          ? "US Dollar"
          : fromCurrency === "NGN"
          ? "Nigerian Naira"
          : "Euro"
      }`;

    currencyBoxes[1].textContent =
      `${toCurrency} - ${
        toCurrency === "USD"
          ? "US Dollar"
          : toCurrency === "NGN"
          ? "Nigerian Naira"
          : "Euro"
      }`;

    convertCurrency();
  });

</script>
</body>
</html>
