<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Currency Converter</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div>

      <div class="logo">

        <div>
          <h3>Currency Converter</h3>
        </div>

      </div>

      <nav>

        <a href="index.html" class="active">
          <i class="fa-solid fa-house"></i>
          Converter
        </a>

        <a href="rates.html">
          <i class="fa-solid fa-chart-column"></i>
          Rates
        </a>

      </nav>

    </div>

    <div class="sidebar-footer">

      <p>
        Thanks for using Currency Converter. Don't forget to share!
      </p>

      <button class="share-box">
        <span>Share</span>
        <i class="fa-solid fa-globe"></i>
      </button> 
      <!-- Changes to 'Link Copied!' when clicked and copies our link to the user's clipboard. -->

    </div>

  </aside>

  <!-- MAIN CONTENT -->

  <main class="main-content">

    <!-- CARD -->

    <div class="converter-card">

      <div class="card-header">

        <div>

          <h1>Converter</h1>

          <p>
            Convert currencies instantly and easily
          </p>

        </div>

      </div>

      <!-- Amount -->

      <label>Amount</label>

      <div class="amount-box">

        <input
        type="text"
        inputmode="decimal"
        placeholder="Enter an amount">

      </div>

      <!-- Currency Row -->
       

      <div class="currency-row">

        <div class="currency-box">

          <span>USD - US Dollar</span>

          <i class="fa-solid fa-chevron-down"></i>

        </div>

        <button class="swap-btn">

          <i class="fa-solid fa-right-left"></i>

        </button>

        <div class="currency-box">

          <span>NGN - Nigerian Naira</span>

          <i class="fa-solid fa-chevron-down"></i>

        </div>

      </div>

      

      <!-- Result -->

      <label>Converted Amount</label>

      <div class="result-box">

        <h2>₦1,540,000.00</h2>

        <p>1 USD = 1,540 NGN</p>

      </div>

      <button class="convert-btn">

        Convert Currency

      </button>

    </div>

  </main>

</div>

</body>
</html>

<!-- saving for possible use later: <i class="fa-solid fa-chevron-down"></i> -->
<!-- make fontawesome icons accessible and use span element instead of i element -->
